name: Build registry

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build registry.json
        run: |
          echo "[" > registry.json
          first=true
          for dir in */; do
            dir="${dir%/}"
            # Skip non-skill dirs
            [ ! -f "$dir/SKILL.md" ] && [ ! -f "$dir/skill.ir.yaml" ] && continue
            file="$dir/SKILL.md"
            [ ! -f "$file" ] && file="$dir/skill.ir.yaml"
            name=$(grep -m1 '^name:' "$file" | sed 's/^name:\s*//' | tr -d '"')
            desc=$(grep -m1 '^description:' "$file" | sed 's/^description:\s*//' | tr -d '"')
            pack=$(grep -m1 '^pack:' "$file" | sed 's/^pack:\s*//' | tr -d '"')
            [ -z "$name" ] && continue
            if [ "$first" = true ]; then first=false; else echo "," >> registry.json; fi
            if [ -n "$pack" ]; then
              printf '  {"name":"%s","description":"%s","pack":"%s"}' "$name" "$desc" "$pack" >> registry.json
            else
              printf '  {"name":"%s","description":"%s"}' "$name" "$desc" >> registry.json
            fi
          done
          echo "" >> registry.json
          echo "]" >> registry.json
          cat registry.json

      - name: Commit registry.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add registry.json
          git diff --staged --quiet || git commit -m "build: update registry.json" && git push
