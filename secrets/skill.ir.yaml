# Antidrift Skill IR — do not edit manually

name: "secrets"
description: "Find exposed secrets and credentials in the codebase. Scan for API keys, passwords, tokens, and private keys."
argument-hint: "[project path]"
auto-invoke: true
source: "claude"
pack: "security"

---instructions---
Scans a codebase for exposed secrets and credentials. Finds API keys, passwords, tokens, private keys, and database connection strings.

## Instructions

### Step 1 — Which codebase?

Check `$ARGUMENTS` for a project path. If not provided, check `.claude/local.json` for known projects and ask which one. Default to current directory.

### Step 2 — Scan for secrets

Search for common secret patterns:

```bash
# API keys and tokens
grep -rn --include="*.ts" --include="*.js" --include="*.py" --include="*.go" --include="*.rb" --include="*.java" --include="*.env" --include="*.yaml" --include="*.yml" --include="*.json" --include="*.toml" --include="*.cfg" --include="*.conf" \
  -E '(password|passwd|secret|api_key|apikey|api[-_]secret|token|access_token|private_key|ssh_key|aws_access|aws_secret|AKIA[A-Z0-9]{16}|sk-[a-zA-Z0-9]{20,}|ghp_[a-zA-Z0-9]{36}|gho_[a-zA-Z0-9]{36}|xox[bpors]-[a-zA-Z0-9-]+)\s*[:=]' . \
  | grep -v node_modules | grep -v .git | grep -v dist | grep -v __pycache__ | grep -v .venv
```

Also check:
```bash
# .env files that shouldn't be committed
find . -name ".env" -o -name ".env.*" | grep -v node_modules | grep -v .git

# Private key files
find . -name "*.pem" -o -name "*.key" -o -name "id_rsa" -o -name "id_ed25519" | grep -v node_modules | grep -v .git

# Files with credentials in the name
find . -name "*credential*" -o -name "*secret*" -o -name "*password*" | grep -v node_modules | grep -v .git
```

### Step 3 — Check .gitignore

Verify these are in `.gitignore`:
- `.env`
- `.env.*`
- `*.pem`
- `*.key`
- `credentials.json`
- `*secret*`

### Step 4 — Check git history

```bash
# Check if secrets were ever committed (even if removed)
git log --all --diff-filter=D -- "*.env" "*.pem" "*.key" "*credential*" 2>/dev/null
```

If secrets were previously committed, warn that they may still be in git history.

### Step 5 — Report

```markdown
# Secret Scan — <project name>
**Date:** <today>

## Findings

### Exposed Secrets (<count>)

| # | Type | File | Line | Status |
|---|------|------|------|--------|
| 1 | API Key | src/config.ts | 42 | **EXPOSED** |
| 2 | Password | .env.example | 5 | Template (OK) |

### Details

#### S-001: <type> in <file>
- **Line:** <line number>
- **Risk:** <what could happen if exploited>
- **Fix:** Move to environment variable, rotate the credential

### .env Files

| File | In .gitignore? | Committed? |
|------|---------------|------------|
| .env | Yes | No — OK |
| .env.production | No | **Yes — EXPOSED** |

### Git History
<any secrets found in historical commits>

## Recommendations
1. **Immediate:** Rotate any exposed credentials
2. **Fix:** Move secrets to environment variables
3. **Prevent:** Update .gitignore, add pre-commit hook
4. **History:** If secrets were committed, consider `git filter-repo` to remove them

## .gitignore Additions Needed
```
<any missing patterns>
```
```

### Step 6 — Offer fixes

For each exposed secret, offer to:
- Add the pattern to `.gitignore`
- Replace the hardcoded value with an environment variable reference
- Generate a `.env.example` with placeholder values
